- id: ai-art
  label: "AI art"
  label_ja: "AIアート"
  notes: "Broad term; often includes non-ML AI, generative AI, and AI-assisted workflows."
- id: computational-creativity
  label: "Computational creativity"
  label_ja: "計算論的創造性"
  notes: "Research field studying systems that model, support, or exhibit creative behavior."
- id: generative-art
  label: "Generative art"
  label_ja: "生成芸術"
  notes: "Older and broader than machine learning; includes rule-based, procedural, evolutionary, and ML systems."
- id: neural-style-transfer
  label: "Neural style transfer"
  label_ja: "ニューラルスタイル変換"
  notes: "Recombination of image content and style using neural representations."
- id: gan
  label: "GAN"
  label_ja: "GAN"
  notes: "Adversarial generative modeling; central to many 2010s AI artworks."
- id: diffusion
  label: "Diffusion model"
  label_ja: "拡散モデル"
  notes: "Dominant image generation family in the 2020s."
- id: prompt
  label: "Prompting"
  label_ja: "プロンプト"
  notes: "Natural-language or multimodal steering interface for generative models."
- id: interactive-machine-learning
  label: "Interactive machine learning"
  label_ja: "インタラクティブ機械学習"
  notes: "Human-in-the-loop learning for creative interfaces and performance."
- id: dataset-politics
  label: "Dataset politics"
  label_ja: "データセットの政治性"
  notes: "Questions of classification, consent, labor, bias, and power in training data."
- id: provenance
  label: "Provenance"
  label_ja: "来歴"
  notes: "Technical and institutional ways to record origin and editing history of media."
- id: evolutionary-art
  label: "Evolutionary art"
  label_ja: "進化芸術"
  notes: "Generative systems using mutation, selection, genetic algorithms, or artificial-life principles."
- id: queer-ai
  label: "Queer AI"
  label_ja: "クィアAI"
  notes: "Practices that challenge normative datasets, identity categories, and representational assumptions in AI systems."
- id: small-data
  label: "Small data"
  label_ja: "小さなデータ"
  notes: "Community, family, or artist-controlled datasets used against the assumption that bigger datasets are always better."
- id: creative-tools
  label: "Creative AI tools"
  label_ja: "創作AIツール"
  notes: "Software platforms and libraries that let artists use or train ML systems in creative workflows."
- id: generative-video
  label: "Generative video"
  label_ja: "生成動画"
  notes: "Video generation and transformation systems used in film, performance, installation, and commercial production."
- id: global-south
  label: "Global South"
  label_ja: "グローバルサウス"
  notes: "Used cautiously for practices that explicitly address uneven data representation, colonial archives, local datasets, and cultural power."
- id: speculative-biology
  label: "Speculative biology"
  label_ja: "思弁的生物学"
  notes: "Generative imagery that invents organisms, ecologies, natural histories, or classification systems."
- id: public-ai-art
  label: "Public AI art"
  label_ja: "公共空間のAIアート"
  notes: "AI-mediated artworks installed in public urban, architectural, or media-facade contexts."
- id: restitution
  label: "Restitution"
  label_ja: "返還・修復的正義"
  notes: "Museum and cultural-heritage debates around looted objects, colonial archives, ownership, and reparative practice."
