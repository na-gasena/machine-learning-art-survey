- id: ai-art
  label: "AI art"
  label_ja: "AIアート"
  notes: "Broad term; often includes non-ML AI, generative AI, and AI-assisted workflows."
- id: computational-creativity
  label: "Computational creativity"
  label_ja: "計算論的創造性"
  notes: "Research field studying systems that model, support, or exhibit creative behavior."
- id: generative-art
  label: "Generative art"
  label_ja: "生成芸術"
  notes: "Older and broader than machine learning; includes rule-based, procedural, evolutionary, and ML systems."
- id: neural-style-transfer
  label: "Neural style transfer"
  label_ja: "ニューラルスタイル変換"
  notes: "Recombination of image content and style using neural representations."
- id: gan
  label: "GAN"
  label_ja: "GAN"
  notes: "Adversarial generative modeling; central to many 2010s AI artworks."
- id: diffusion
  label: "Diffusion model"
  label_ja: "拡散モデル"
  notes: "Dominant image generation family in the 2020s."
- id: prompt
  label: "Prompting"
  label_ja: "プロンプト"
  notes: "Natural-language or multimodal steering interface for generative models."
- id: interactive-machine-learning
  label: "Interactive machine learning"
  label_ja: "インタラクティブ機械学習"
  notes: "Human-in-the-loop learning for creative interfaces and performance."
- id: dataset-politics
  label: "Dataset politics"
  label_ja: "データセットの政治性"
  notes: "Questions of classification, consent, labor, bias, and power in training data."
- id: provenance
  label: "Provenance"
  label_ja: "来歴"
  notes: "Technical and institutional ways to record origin and editing history of media."
- id: evolutionary-art
  label: "Evolutionary art"
  label_ja: "進化芸術"
  notes: "Generative systems using mutation, selection, genetic algorithms, or artificial-life principles."
- id: queer-ai
  label: "Queer AI"
  label_ja: "クィアAI"
  notes: "Practices that challenge normative datasets, identity categories, and representational assumptions in AI systems."
- id: small-data
  label: "Small data"
  label_ja: "小さなデータ"
  notes: "Community, family, or artist-controlled datasets used against the assumption that bigger datasets are always better."
- id: creative-tools
  label: "Creative AI tools"
  label_ja: "創作AIツール"
  notes: "Software platforms and libraries that let artists use or train ML systems in creative workflows."
- id: generative-video
  label: "Generative video"
  label_ja: "生成動画"
  notes: "Video generation and transformation systems used in film, performance, installation, and commercial production."
- id: global-south
  label: "Global South"
  label_ja: "グローバルサウス"
  notes: "Used cautiously for practices that explicitly address uneven data representation, colonial archives, local datasets, and cultural power."
- id: speculative-biology
  label: "Speculative biology"
  label_ja: "思弁的生物学"
  notes: "Generative imagery that invents organisms, ecologies, natural histories, or classification systems."
- id: public-ai-art
  label: "Public AI art"
  label_ja: "公共空間のAIアート"
  notes: "AI-mediated artworks installed in public urban, architectural, or media-facade contexts."
- id: restitution
  label: "Restitution"
  label_ja: "返還・修復的正義"
  notes: "Museum and cultural-heritage debates around looted objects, colonial archives, ownership, and reparative practice."
- id: computational-literature
  label: "Computational literature"
  label_ja: "計算文学"
  notes: "Literary production involving rules, programs, sensors, language models, and computational reading or writing systems."
- id: algorithmic-composition
  label: "Algorithmic composition"
  label_ja: "アルゴリズム作曲"
  notes: "Music made with formal rules, stochastic processes, search, or learned models."
- id: artificial-life-art
  label: "Artificial-life art"
  label_ja: "人工生命芸術"
  notes: "Works organized around evolving, adaptive, autonomous, or ecosystem-like computational agents."
- id: live-simulation
  label: "Live simulation"
  label_ja: "ライブ・シミュレーション"
  notes: "Time-based systems whose state continues to change during display rather than replaying a fixed sequence."
- id: machine-listening
  label: "Machine listening"
  label_ja: "機械聴取"
  notes: "Computational analysis and organization of sound used in performance, production, archives, and creative coding."
- id: embodied-ai
  label: "Embodied AI"
  label_ja: "身体化AI"
  notes: "AI systems whose behavior depends on physical bodies, sensors, spatial relations, and performance context."
- id: dance-archive
  label: "Dance archive"
  label_ja: "ダンス・アーカイブ"
  notes: "Recorded movement and choreographic materials used for preservation, analysis, training, or new creation."
- id: sinofuturism
  label: "Sinofuturism"
  label_ja: "シノフューチャリズム"
  notes: "Critical and speculative framing of technology, geopolitics, labor, and East Asian futures."
- id: indigenous-ai
  label: "Indigenous AI"
  label_ja: "先住民AI"
  notes: "Situated approaches to AI grounded in Indigenous sovereignty, knowledge, language, kinship, and accountability."
- id: colonial-taxonomy
  label: "Colonial taxonomy"
  label_ja: "植民地主義的分類"
  notes: "Historical naming and classification systems whose power relations can persist in contemporary datasets."
- id: data-lifecycle
  label: "Dataset lifecycle"
  label_ja: "データセットのライフサイクル"
  notes: "Creation, versioning, distribution, withdrawal, maintenance, and disappearance of research datasets."
- id: training-data-transparency
  label: "Training-data transparency"
  label_ja: "訓練データ透明性"
  notes: "Documentation and disclosure of sources, licenses, composition, exclusions, and creator preferences in model training."
- id: software-art-conservation
  label: "Software-art conservation"
  label_ja: "ソフトウェア・アート保存"
  notes: "Preservation of code, dependencies, hardware, state, interfaces, documentation, and behavior."
- id: exhibition-history
  label: "Exhibition history"
  label_ja: "展覧会史"
  notes: "How curatorial frameworks, venues, catalogues, and display technologies shape what counts as AI or computer art."
- id: art-market
  label: "AI art market"
  label_ja: "AIアート市場"
  notes: "Auctions, galleries, platforms, ownership claims, pricing, and promotional narratives around AI-mediated art."
