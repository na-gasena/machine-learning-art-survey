- id: imagenet
  name: "ImageNet"
  url: "https://www.image-net.org/"
  domain: "computer vision"
  relevance: "Foundational visual recognition dataset and later object of critical dataset art."
  rights_or_ethics_notes: "Dataset categories, image sourcing, and people-subtree issues require historical context."
- id: wikiart
  name: "WikiArt"
  url: "https://www.wikiart.org/"
  domain: "art images and metadata"
  relevance: "Common source for art style classification and generative art research."
  rights_or_ethics_notes: "Licensing varies by artwork and source."
- id: laion-5b
  name: "LAION-5B"
  url: "https://laion.ai/blog/laion-5b/"
  domain: "image-text"
  relevance: "Large-scale dataset relevant to open text-to-image model training and controversies."
  rights_or_ethics_notes: "Consent, privacy, copyright, and harmful-content concerns are central."
- id: nsynth
  name: "NSynth"
  url: "https://magenta.tensorflow.org/datasets/nsynth"
  domain: "audio/music"
  relevance: "Annotated musical note dataset for neural audio synthesis."
  rights_or_ethics_notes: "Built from commercial sample libraries; check dataset license before reuse."
- id: artemis
  name: "ArtEmis"
  url: "https://www.artemisdataset.org/"
  domain: "art emotion and language"
  relevance: "Affective labels and explanations for artworks."
  rights_or_ethics_notes: "Human annotation and artwork rights should be considered."
- id: people-art
  name: "People-Art"
  url: "https://arxiv.org/abs/1610.08871"
  domain: "object detection in artworks"
  relevance: "Benchmark for detecting people in artworks across styles."
  rights_or_ethics_notes: "Artwork image sources require checking for downstream reuse."
- id: human-art
  name: "Human-Art"
  url: "https://arxiv.org/abs/2303.02760"
  domain: "human-centric art/natural images"
  relevance: "Bridges natural and artificial scenes for human detection/pose/generation tasks."
  rights_or_ethics_notes: "Contains human-centric imagery; dataset terms should be checked."
- id: artbench
  name: "ArtBench-10"
  url: "https://github.com/liaopeiyuan/artbench"
  domain: "artwork generation benchmark"
  relevance: "Balanced benchmark for comparing generative models on artwork styles."
  rights_or_ethics_notes: "Authors describe Fair Use; downstream reuse requires independent rights review."
- id: bam
  name: "BAM! Behance Artistic Media Dataset"
  url: "https://arxiv.org/abs/1704.08614"
  domain: "artistic media recognition"
  relevance: "Large-scale dataset for artistic media, content, and emotion labels beyond photography."
  rights_or_ethics_notes: "Derived from Behance portfolios; check dataset terms and creator rights."
- id: ffhq
  name: "Flickr-Faces-HQ"
  url: "https://github.com/NVlabs/ffhq-dataset"
  domain: "face image dataset"
  relevance: "Important in GAN/deepfake face-generation history and queer dataset interventions such as The Zizi Project."
  rights_or_ethics_notes: "Face datasets raise consent, biometric, and reuse concerns."
- id: omniart
  name: "OmniArt"
  url: "https://isis-data.science.uva.nl/strezoski/"
  domain: "multimodal art images and metadata"
  relevance: "Influential resource for multi-task artwork classification and retrieval."
  rights_or_ethics_notes: "The official page states that the dataset has been unavailable since 2025; reproducibility and source-image rights require review."
- id: semart
  name: "SemArt"
  url: "https://researchdata.aston.ac.uk/id/eprint/380/"
  domain: "art images and textual descriptions"
  relevance: "Supports cross-modal retrieval and analysis of semantic relations between artworks and descriptions."
  rights_or_ethics_notes: "Description provenance, vocabulary, art-historical coverage, and source-image rights should be documented."
- id: artgraph
  name: "ArtGraph"
  url: "https://zenodo.org/records/6337958"
  domain: "art knowledge graph"
  relevance: "Represents relations among artworks, artists, styles, genres, and other entities."
  rights_or_ethics_notes: "Graph schemas and upstream data choices encode art-historical assumptions."
- id: met-collection-api
  name: "The Metropolitan Museum of Art Collection API"
  url: "https://metmuseum.github.io/"
  domain: "museum collection metadata and public-domain images"
  relevance: "Official API widely used for research, interfaces, and creative reuse."
  rights_or_ethics_notes: "Object-level public-domain and image availability fields must be checked."
- id: rijksmuseum-data-services
  name: "Rijksmuseum Data Services"
  url: "https://data.rijksmuseum.nl/"
  domain: "museum collection data and images"
  relevance: "Provides official APIs, Linked Open Data, downloads, and IIIF services."
  rights_or_ethics_notes: "Terms, record scope, and object-level rights statements should be retained in derivatives."
- id: smithsonian-open-access
  name: "Smithsonian Open Access"
  url: "https://www.si.edu/OpenAccess"
  domain: "multidisciplinary museum collection data"
  relevance: "Large institutional collection resource spanning art, history, science, and culture."
  rights_or_ethics_notes: "Open-access status does not eliminate cultural sensitivity, community authority, or Indigenous data-governance concerns."
- id: moma-collection-data
  name: "MoMA Collection Data"
  url: "https://github.com/MuseumofModernArt/collection"
  domain: "modern and contemporary art metadata"
  relevance: "Official GitHub-published artwork and artist metadata for research."
  rights_or_ethics_notes: "Metadata is not a complete digitization of the collection and does not grant rights to artwork images."
- id: national-gallery-art-open-data
  name: "National Gallery of Art Open Data"
  url: "https://github.com/NationalGalleryOfArt/opendata"
  domain: "museum collection linked data"
  relevance: "Official data exports for collection and constituent research."
  rights_or_ethics_notes: "Version, field definitions, image rights, and upstream cataloguing decisions should be recorded."
