<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'ja' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title | escape }} | {% endif %}{{ site.title | escape }}</title>
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <div class="wrapper">
        <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <nav class="site-nav" aria-label="Main navigation">
          <a href="{{ '/ja/' | relative_url }}">日本語</a>
          <a href="{{ '/en/' | relative_url }}">English</a>
          <a href="{{ '/ja/survey-map/' | relative_url }}">分野地図</a>
          <a href="{{ '/en/survey-map/' | relative_url }}">Survey Map</a>
          <a href="{{ '/audit-report/' | relative_url }}">Audit</a>
        </nav>
      </div>
    </header>
    <main class="page-content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>
    <footer class="site-footer">
      <div class="wrapper">
        <p>Machine Learning Art Survey. Source records are stored in <code>_data/</code>.</p>
      </div>
    </footer>
  </body>
</html>
